<div class="main">
  <h1>Mozilla Dev - My To Do List</h1>

  <!-- ===== TELA PRINCIPAL (usuário logado) ===== -->
  <div *ngIf="usuarioLogado()">
    <input class="lg-text-input" #campoNovoItem />
    <button class="btn-primary" (click)="CREATE_tarefa(campoNovoItem.value)">
      Adicionar Tarefa
    </button>

    <ul>
      <li *ngFor="let tarefaDoLoop of arrayDeTarefas()">
        <app-item
          [tarefa]="tarefaDoLoop"
          (removeTarefa)="DELETE_tarefa(tarefaDoLoop)"
          (modificaTarefa)="UPDATE_tarefa($event)">
        </app-item>
      </li>
    </ul>
  </div>

  <!-- ===== TELA DE LOGIN (usuário não logado) ===== -->
  <div *ngIf="!usuarioLogado()">
    <input #username placeholder="nome" class="lg-text-input" />
    <br />
    <input #password placeholder="senha" type="password" class="lg-text-input" />
    <button class="btn-primary" (click)="login(username.value, password.value)">
      Login
    </button>
  </div>
</div>
